{% extends "base.html" %}
{% block content %}
  <h2>Pending Assets</h2>
  <table class="table table-striped">
    <thead>
      <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Category</th>
        <th>Purchase Date</th>
        <th>Status</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      {% for asset in assets %}
      <tr>
        <td>{{ asset.id }}</td>
        <td>{{ asset.name }}</td>
        <td>{{ asset.category }}</td>
        <td>{{ asset.purchase_date.strftime('%Y-%m-%d') }}</td>
        <td>{{ asset.status }}</td>
        <td>
          <form action="{{ url_for('main.approve_asset', id=asset.id) }}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-sm btn-success">Approve</button>
          </form>
          <form action="{{ url_for('main.reject_asset', id=asset.id) }}" method="post" style="display:inline;">
            <button type="submit" class="btn btn-sm btn-danger">Reject</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
{% endblock %}
